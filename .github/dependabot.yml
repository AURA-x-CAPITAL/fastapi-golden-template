version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /.github
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆

  # Python
  - package-ecosystem: uv
    directory: /src
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆

  # Enable version updates for Docker
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
